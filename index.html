<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Sinovuz Max</title>
    <style>
        body { font-family: sans-serif; background-color: #0f0f12; color: #fff; margin: 0; padding: 20px; }
        .header { text-align: center; background: #1a1a26; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .tab-btn { background: #252538; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-right: 5px; }
        .tab-btn.active { background: #007bff; }
        .list-item { background: #1a1a26; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 4px solid #007bff; cursor: pointer; }
        .mock-item { border-left: 4px solid #ffc107; }
        #quiz-container, #topic-menu, #mock-menu, #result-screen { display: none; background: #1a1a26; padding: 20px; border-radius: 12px; }
        .option { background: #11111b; padding: 12px; margin: 8px 0; border-radius: 6px; cursor: pointer; border: 1px solid #444; }
        .correct { background: #28a745 !important; border-color: #28a745; }
        .wrong { background: #dc3545 !important; border-color: #dc3545; }
        img { max-width: 100%; border-radius: 8px; margin-bottom: 10px; display: block; margin: 0 auto; }
    </style>
</head>
<body>

    <div class="header">
        <h3>Tuzuvchi va Mentor:</h3>
        <h2>Saydazimov Shuxrat</h2>
    </div>

    <!-- Tablar -->
    <div style="margin-bottom: 20px;">
        <button id="main-tab" class="tab-btn active" onclick="showSection('main-menu')">Mavzulashgan testlar</button>
        <button id="mock-tab" class="tab-btn" onclick="showSection('mock-menu')">Milliy sertifikat MOCK</button>
    </div>

    <!-- Asosiy menyu -->
    <div id="main-menu">
        <div class="list-item" onclick="showTopics()">📁 6-sinf. Qadimgi dunyo tarixi</div>
        <div class="list-item">📁 7-sinf. O'zbekiston tarixi</div>
        <div class="list-item">📁 8-sinf. Jahon tarixi</div>
    </div>

    <!-- 6-sinf mavzular menyusi -->
    <div id="topic-menu">
        <h3>6-sinf mavzulari:</h3>
        <div class="list-item" onclick="startQuiz()">Kirish</div>
        <button class="tab-btn" onclick="showSection('main-menu')">Orqaga</button>
    </div>

    <!-- MOCK menyu -->
    <div id="mock-menu">
        <div class="list-item mock-item" onclick="()">📝 MOCK Test №1</div>
        <div class="list-item mock-item" onclick="Mock tez orada yuklanadi">📝 MOCK Test №2</div>
    </div>

    <!-- Test oynasi -->
    <div id="quiz-container">
        <h3 id="question"></h3>
        <div id="image-box"></div>
        <div id="options"></div>
    </div>

    <!-- Natija oynasi -->
    <div id="result-screen">
        <h2>Test yakunlandi!</h2>
        <div id="score-text" style="font-size: 20px; margin: 20px 0;"></div>
        <div id="grade-text" style="font-size: 30px; font-weight: bold;"></div>
        <br>
        <button onclick="location.reload()" class="tab-btn">Bosh sahifaga qaytish</button>
    </div>

    <script>
       const quizData = [
    {q: ". Paleolit nima?", a: ["Yangi tosh davri", "Mis-tosh davri", "Qadimgi tosh davri", "O‘rta tosh davri"], c: 2},
    {q: ". Behistun qoyasi yozuvlari qayerda joylashgan?", a: ["Pokistonda", "Eronda", "Afg‘onistonda", "Turkmanistonda"], c: 1},
    {q: ". Nima sababdan jamoadagi yetakchilik mavqeyi asta-sekin ayoldan erkak kishiga o‘ta boshlagan?", a: ["O‘zaro urushlar avj olganligi sababli", "Ayollar uy ishlariga ko‘proq e‘tibor qaratganligi sababli", "Mehnat qurollari va xo‘jalik yuritish shakllari takomillashgani sababli", "Barcha javoblar to‘g‘ri"], c: 2},
    {q: ". “Geografiya” nomli asar muallifi kim?", a: ["Plutarx", "Geradot", "Strabon", "Arrian"], c: 2},
    {q: ". Qaysi soha mutaxassislari qadimgi odamlarning ko‘pgina urf-odatlari, xo‘jalik va madaniy an‘analarini saqlab qolgan, hozirda yashayotgan qabilalar va elatlarni o‘rganishadi?", a: ["Arxeologlar", "Etnograflar", "Antropologlar", "Lingvistlar"], c: 1},
    {q: ". Qadimgi yunon tarixchisi Gerodot qachon yashagan?", a: ["Miloddan avvalgi II asrda", "Miloddan avvalgi IV asrda", "Miloddan avvalgi V asrda", "Miloddan avvalgi III asrda"], c: 2},
    {q: ". Ilk urug‘ jamoalari ... atrofida birlashgan.", a: ["ayol", "erkak", "kohin", "sarkarda"], c: 0},
    {q: ". Behistun qoyasi yozuvlari qaysi fors shohi buyrug‘iga binoan yozilgan?", a: ["Doro I", "Doro III", "Kir II", "Kserks"], c: 0},
    {q: ". Jahondagi barcha xalqlarning tarixi qaysi tuzumdan boshlangan?", a: ["Feodalizmdan", "Matriarxatdan", "Patriarxatdan", "Ibtidoiy jamoa tuzumidan"], c: 3},
    {q: ". Quyidagi suratda kim tasvirlangan?", a: ["Plutarx", "Geradot", "Strabon", "Arrian"], c: 1, img: "image_e4a81f.png"},
    {q: ". “Patriarxat” nima?", a: ["Ona urug‘i davri", "Ota urug‘i davri", "Ilk podsholik davri", "Urug‘chilik davri"], c: 1},
    {q: ". Mezolit nima?", a: ["Yangi tosh davri", "Mis-tosh davri", "Qadimgi tosh davri", "O‘rta tosh davri"], c: 3},
    {q: ". Qaysi soha mutaxassislari qadimgi odamlarning suyak qoldiqlarini o‘rganadilar?", a: ["Arxeologlar", "Etnograflar", "Antropologlar", "Lingvistlar"], c: 2},
    {q: ". Qadimda inson qo‘li bilan yaratilgan barcha narsalar qanday ataladi?", a: ["Ma‘naviy manbalar", "Tarixiy manbalar", "Moddiy (ashyoviy) manbalar", "Antropologik manbalar"], c: 2},
    {q: ". Ibtidoiy jamoalar asta-sekin ... urug‘laridan iborat alohida urug‘ jamoalariga bo‘lina boshladi.", a: ["qarindosh", "qabiladosh", "kasbdosh", "yondosh"], c: 0},
    {q: ". “Matriarxat” nima?", a: ["Ona urug‘i davri", "Ota urug‘i davri", "Ilk podsholik davri", "Urug‘chilik davri"], c: 0},
    {q: ". Quyidagi suratda kim tasvirlangan?", a: ["Plutarx", "Geradot", "Strabon", "Arrian"], c: 2, img: "image_dac6d5.png"},
    {q: ". Qaysi soha mutaxassislari qadimgi manzilgohlarda qazishma ishlarini amalga oshiradilar?", a: ["Arxeologlar", "Etnograflar", "Antropologlar", "Lingvistlar"], c: 0},
    {q: ". Eneolit nima?", a: ["Yangi tosh davri", "Mis-tosh davri", "Qadimgi tosh davri", "O‘rta tosh davri"], c: 1},
    {q: ". Quyidagi suratda nima tasvirlangan?", a: ["Avesto kitobining qoyaga o‘yib yozilgan qismi", "Kirmonshoh bitiklari", "Behistun qoyasi yozuvlari va bo‘rtma tasvirlari", "Naqshi Rustam yozuvlari"], c: 2, img: "image_dac69a.png"},
    {q: ". O‘rta Osiyo tarixi bo‘yicha eng qadimgi yozma manba qaysi?", a: ["Xitoy solnomalari", "Behistun qoyasi yozuvlari", "Yunon manbalari", "Avesto kitobi"], c: 3},
    {q: ". Yunon tarixchisi va geografi Strabon qachon yashagan?", a: ["Mil. avv. I asr boshlarida", "Mil. avv. I asr oxirlarida", "Milodiy I asr boshlarida", "Milodiy I asr oxirlarida"], c: 1},
    {q: ". Neolit nima?", a: ["Yangi tosh davri", "Mis-tosh davri", "Qadimgi tosh davri", "O‘rta tosh davri"], c: 0},
    {q: ". To‘g‘ri javobni toping (paleos, mezos, neos, eneus).", a: ["Yunoncha paleos – “qadimgi”, yunoncha mezos – “o‘rta”, yunoncha neos – “yangi”, lotincha eneus – “mis”", "Yunoncha paleos – “yangi”...", "Yunoncha...", "Lotincha..."], c: 0},
    {q: ". “Tarix” nomli asarni kim yozgan?", a: ["Plutarx", "Geradot", "Strabon", "Arrian"], c: 1},
    {q: ". “Aleksandrning harbiy yurishlari” nomli asarni kim yozgan?", a: ["Plutarx", "Geradot", "Strabon", "Arrian"], c: 3},
    {q: ". “Qadimgi dunyo tarixi” qaysi davrlarni o‘z ichiga oladi?", a: ["Yer yuzida odam paydo bo‘lganidan 478-yilda Rim imperiyasi qulaguniga qadar", "Antik davr boshlanishidan M. Iskandar yurishlarigacha", "Yer yuzida odam paydo bo‘lganidan 476-yilda G‘arbiy Rim imperiyasi qulaguniga qadar", "Rim shahri paydo bo‘lganidan 1453-yilgacha"], c: 2},
    {q: ". Yunon tarixchisi Arrian qachon yashagan?", a: ["Milodiy I asrda", "Milodiy II asrda", "Milodiy III asrda", "Milodiy IV asrda"], c: 1},
    {q: ". Nima sababdan arxeologlar insoniyat tarixining boshlanishini “tosh davri” deb atashgan?", a: ["Eng qadimgi odamlar surat tushirganligi", "Dastlabki taqinchoqlar toshdan bo‘lganligi", "Odamlar qoldiqlari toshga aylanganligi", "Eng qadimgi odamlar dastlabki mehnat qurollarini toshlardan yasaganligi"], c: 3},
    {q: ". Yunoncha “litos” so‘zi qanday ma‘noni anglatadi?", a: ["Temir", "Mis", "Tosh", "Oltin"], c: 2}
];
        let currentQ = 0, score = 0;

        function showSection(id) {
            document.querySelectorAll('#main-menu, #topic-menu, #mock-menu, #quiz-container, #result-screen').forEach(el => el.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            
            // Tab aktivligini o'zgartirish
            document.getElementById('main-tab').classList.toggle('active', id === 'main-menu');
            document.getElementById('mock-tab').classList.toggle('active', id === 'mock-menu');
        }

        function showTopics() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('topic-menu').style.display = 'block';
        }

        function startQuiz() {
            document.querySelectorAll('#main-menu, #topic-menu, #mock-menu').forEach(el => el.style.display = 'none');
            document.getElementById('quiz-container').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            let q = quizData[currentQ];
            document.getElementById('question').innerText = (currentQ + 1) + ". " + q.q;
            document.getElementById('image-box').innerHTML = q.img ? `<img src="${q.img}">` : '';
            let ops = document.getElementById('options'); ops.innerHTML = '';
            q.a.forEach((opt, i) => {
                let div = document.createElement('div');
                div.className = 'option';
                div.innerText = opt;
                div.onclick = function() { check(i, div); };
                ops.appendChild(div);
            });
        }

        function check(idx, el) {
            let options = document.querySelectorAll('.option');
            options.forEach(o => o.style.pointerEvents = 'none');
            if(idx === quizData[currentQ].c) {
                el.classList.add('correct');
                score++;
            } else {
                el.classList.add('wrong');
                options[quizData[currentQ].c].classList.add('correct');
            }
            setTimeout(() => {
                currentQ++;
                if(currentQ < quizData.length) showQuestion();
                else showResults();
            }, 1000);
        }

        function showResults() {
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            let p = (score / quizData.length) * 100;
            document.getElementById('score-text').innerText = score + " ta to'g'ri / " + quizData.length + " ta savol (" + p.toFixed(0) + "%)";
            let g = document.getElementById('grade-text');
            if(p == 100) { g.innerText = "A'LO"; g.style.color = "#28a745"; }
            else if(p >= 80) { g.innerText = "YAXSHI"; g.style.color = "#007bff"; }
            else { g.innerText = "QONIQARLI"; g.style.color = "#ffc107"; }
        }
    </script>
</body>
</html>
