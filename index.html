<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarix Yakuniy Imtihon Platformasi</title>
    <style>
        :root { --p: #2563eb; --s: #10b981; --d: #ef4444; --b: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--b); color: #1e293b; padding: 20px; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 25px; position: sticky; top: 0; background: white; z-index: 10; }
        #timer { font-size: 24px; font-weight: 700; color: var(--d); background: #fef2f2; padding: 5px 15px; border-radius: 8px; border: 1px solid #fee2e2; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-d { background: var(--d); color: white; }
        .btn-p { background: var(--p); color: white; display: block; width: 100%; margin-top: 30px; font-size: 18px; padding: 15px; }
        .btn:hover { opacity: 0.9; }
        .alert { background: #fff5f5; border-left: 4px solid var(--d); padding: 12px; margin-bottom: 20px; color: #c53030; font-weight: bold; font-size: 14px; line-height: 1.5; }
        .q-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .q-txt { font-weight: 600; font-size: 16px; margin-bottom: 12px; line-height: 1.5; }
        .options { display: grid; gap: 10px; margin-bottom: 10px; }
        .opt { display: flex; align-items: center; padding: 10px 15px; background: white; border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer; }
        .opt input { margin-right: 12px; transform: scale(1.2); }
        .opt.selected { border-color: var(--p); background: #eff6ff; }
        .text-input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }
        .text-input:focus { border-color: var(--p); outline: none; background: #fafafa; }
        .sub-q { margin-top: 15px; padding-left: 15px; border-left: 2px dashed #cbd5e1; }
        .sub-title { font-weight: 600; color: #475569; margin-bottom: 5px; font-size: 14px; }
        .res-icon { font-size: 20px; font-weight: bold; margin-left: 10px; }
        .correct-ans { margin-top: 8px; font-size: 14px; font-weight: 600; color: #2563eb; background: #eff6ff; padding: 6px 12px; border-radius: 4px; display: inline-block; }
        .status-correct { border-color: var(--s) !important; background: #ecfdf5 !important; color: #065f46; }
        .status-wrong { border-color: var(--d) !important; background: #fef2f2 !important; color: #991b1b; }
        #result-screen { display: none; text-align: center; padding: 40px 20px; }
        .score-box { font-size: 48px; font-weight: 800; margin: 20px 0; color: var(--p); }
    </style>
</head>
<body>

<div class="container" id="quiz-box">
    <div class="header">
        <h2>Tarix Yakuniy Nazorat Imtihoni</h2>
        <div id="timer">90:00</div>
        <button class="btn btn-d" onclick="finishQuiz()">Testni Tugatish</button>
    </div>

    <div id="questions-container"></div>

    <button class="btn btn-p" onclick="finishQuiz()">Barcha Javoblarni Tekshirish</button>
</div>

<div class="container" id="result-screen">

    <p style="color: #64748b; margin-top: 10px;">Foydalanuvchining natijalari muvaffaqiyatli tekshirildi.</p>
    <div class="score-box" id="score-text"></div>
    <button class="btn btn-p" onclick="window.location.reload()">Testni Qayta Topshirish</button>
</div>

let timeLeft = 90 * 60;
const timerEl = document.getElementById('timer');

const timerInterval = setInterval(() => {
    const mins = Math.floor(timeLeft / 60);
    const secs = timeLeft % 60;
    timerEl.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    if(timeLeft <= 0) { clearInterval(timerInterval); finishQuiz(); }
    timeLeft--;
}, 1000);

function renderQuiz() {
    const container = document.getElementById('questions-container');
    quizData.forEach((q) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.id = `q-box-${q.id}`;
        
        if (q.id === 36) {
            const alert = document.createElement('div');
            alert.className = 'alert';
            alert.innerText = "DIQQAT! HAMMA JAVOBLAR KATTA (BOSH) HARFLARDA QABUL QILINADI! KICHIK HARF ARALASHSA JAVOB AVTOMATIK XATO DEB HISOBLANADI.";
            container.appendChild(alert);
        }

        const qTitle = document.createElement('div');
        qTitle.className = 'q-txt';
        qTitle.innerText = q.q;
        card.appendChild(qTitle);

        if(q.type === 'choice') {
            const optsDiv = document.createElement('div');
            optsDiv.className = 'options';
            q.answers.forEach(opt => {
                const label = document.createElement('label');
                label.className = 'opt';
                label.innerHTML = `<input type="radio" name="q-${q.id}" value="${opt[0]}"> ${opt}`;
                label.onclick = () => {
                    document.querySelectorAll(`input[name="q-${q.id}"]`).forEach(i => i.parentElement.classList.remove('selected'));
                    label.classList.add('selected');
                };
                optsDiv.appendChild(label);
            });
            card.appendChild(optsDiv);
        } else if(q.type === 'open') {
            q.sub.forEach((s, sIdx) => {
                const subDiv = document.createElement('div');
                subDiv.className = 'sub-q';
                subDiv.innerHTML = `
                    <div class="sub-title">${s.label}</div>
                    <input type="text" class="text-input" id="open-${q.id}-${sIdx}" placeholder="JAVOBNI SHU YERGA YOZING...">
                `;
                subDiv.addEventListener('input', (e) => { e.target.value = e.target.value.toUpperCase(); });
                card.appendChild(subDiv);
            });
        }
        container.appendChild(card);
    });
}

function finishQuiz() {
    clearInterval(timerInterval);
    let correctCount = 0;
    let totalQuestions = 0;

    quizData.forEach(q => {
        const card = document.getElementById(`q-box-${q.id}`);
        
        if(q.type === 'choice') {
            totalQuestions++;
            const selectedInput = document.querySelector(`input[name="q-${q.id}"]:checked`);
            const selected = selectedInput ? selectedInput.value : null;
            
            document.querySelectorAll(`input[name="q-${q.id}"]`).forEach(i => {
                i.disabled = true;
                if(i.value === q.correct) i.parentElement.classList.add('status-correct');
            });

            if(selected === q.correct) {
                correctCount++;
                if(selectedInput) selectedInput.parentElement.insertAdjacentHTML('beforeend', '<span class="res-icon" style="color:var(--s)">✔</span>');
            } else {
                if(selectedInput) {
                    selectedInput.parentElement.classList.add('status-wrong');
                    selectedInput.parentElement.insertAdjacentHTML('beforeend', '<span class="res-icon" style="color:var(--d)">✖</span>');
                }
                card.insertAdjacentHTML('beforeend', `<div class="correct-ans">To'g'ri javob: ${q.correct}</div>`);
            }
        } else if(q.type === 'open') {
            q.sub.forEach((s, sIdx) => {
                totalQuestions++;
                const inputEl = document.getElementById(`open-${q.id}-${sIdx}`);
                const userAns = inputEl.value.trim();
                inputEl.disabled = true;

                if(userAns === s.correct) {
                    correctCount++;
                    inputEl.classList.add('status-correct');
                    inputEl.insertAdjacentHTML('afterend', '<span class="res-icon" style="color:var(--s)">✔</span>');
                } else {
                    inputEl.classList.add('status-wrong');
                    inputEl.insertAdjacentHTML('afterend', '<span class="res-icon" style="color:var(--d)">✖</span>');
                    inputEl.insertAdjacentHTML('afterend', `<br><div class="correct-ans">To'g'ri javob: ${s.correct}</div>`);
                }
            });
        }
    });

    document.getElementById('quiz-box').style.opacity = "0.8";
    document.getElementById('score-text').innerText = `${totalQuestions} tadan ${correctCount} ta to'g'ri`;
    document.getElementById('result-screen').style.display = 'block';
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

window.onload = renderQuiz;
</script>

</body>
</html>
