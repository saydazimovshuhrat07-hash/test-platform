<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Sinovuz Max</title>
    <style>
        body { font-family: sans-serif; background-color: #0f0f12; color: #fff; margin: 0; padding: 20px; }
        .header { text-align: center; background: #1a1a26; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .list-item { background: #1a1a26; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid #007bff; cursor: pointer; }
        .file { background: #252538; padding: 12px; margin: 5px 0; border-radius: 6px; cursor: pointer; border-left: 3px solid #00d2ff; }
        #quiz-container { display: none; background: #1a1a26; padding: 20px; border-radius: 12px; border: 1px solid #ffc107; }
        .timer { font-size: 24px; color: #ff4757; font-weight: bold; margin-bottom: 10px; }
        .option { background: #11111b; padding: 12px; margin: 8px 0; border-radius: 6px; cursor: pointer; border: 1px solid #444; }
        .option:hover { background: #353548; }
    </style>
</head>
<body>

    <div class="header">
        <h3>Tuzuvchi va Yaratuvchi:</h3>
        <h2>Saydazimov Shuxrat</h2>
    </div>

    <!-- Asosiy Menyu -->
    <div id="main-menu">
        <div class="list-item" onclick="showTopics()">📁 6-sinf. Qadimgi dunyo tarixi</div>
    </div>

    <!-- Mavzular -->
    <div id="topics-menu" style="display:none;">
        <button onclick="hideTopics()">⬅️ Boshqa sinflarni ko'rish</button>
        <div class="file" onclick="confirmAndStart()">📄 1-mavzu. Kirish</div>
    </div>

    <!-- Test oynasi -->
    <div id="quiz-container">
        <div class="timer" id="timer">15</div>
        <h3 id="question">Savol yuklanmoqda...</h3>
        <div id="options"></div>
    </div>

    <script>
        const quizData = [
            {q: "Quyidagi suratda kim tasvirlangan?", a: ["Plutarx", "Geradot", "Strabon", "Arrian"], c: 1},
            {q: "Behistun qoyasi yozuvlari qayerda joylashgan?", a: ["Pokistonda", "Eronda", "Afg'onistonda", "Turkmanistonda"], c: 1},
            {q: "Yetakchilik ayoldan erkakka o'tishi sababi?", a: ["Urushlar", "Uy ishlari", "Mehnat qurollari takomillashuvi", "Barchasi"], c: 2},
            {q: "Yunon tarixchisi Strabon qachon yashagan?", a: ["Mil.avv I asr bosh", "Mil.avv I asr oxir", "Mil. I asr bosh", "Mil. I asr oxir"], c: 0},
            {q: "Patriarxat nima?", a: ["Ona urug'i", "Ota urug'i", "Ilk podsholik", "Urug'chilik"], c: 1},
            {q: "Quyidagi suratda kim tasvirlangan?", a: ["Plutarx", "Geradot", "Strabon", "Arrian"], c: 0},
            {q: "Ibtidoiy jamoalar ... urug'lariga bo'lina boshladi.", a: ["qarindosh", "qabiladosh", "kasbdosh", "yondosh"], c: 1},
            {q: "Nima uchun 'tosh davri'?", a: ["Suratlar", "Taqinchoqlar", "Tosh qoldiqlari", "Toshdan mehnat qurollari"], c: 3},
            {q: "Ilk urug' jamoalari ... atrofida birlashgan.", a: ["ayol", "erkak", "kohin", "sarkarda"], c: 0},
            {q: "Qadimgi dunyo tarixi qaysi davrlarni o'z ichiga oladi?", a: ["478-yilgacha", "Iskandargacha", "476-yilgacha", "1453-yilgacha"], c: 2},
            {q: "Paleolit nima?", a: ["Yangi tosh", "Mis-tosh", "Qadimgi tosh", "O'rta tosh"], c: 2},
            {q: "Aleksandrning harbiy yurishlari asari muallifi?", a: ["Plutarx", "Geradot", "Strabon", "Arrian"], c: 3},
            {q: "Matriarxat nima?", a: ["Ona urug'i", "Ota urug'i", "Ilk podsholik", "Urug'chilik"], c: 0},
            {q: "Geografiya asari muallifi?", a: ["Plutarx", "Geradot", "Strabon", "Arrian"], c: 2},
            {q: "Suratda nima tasvirlangan?", a: ["Avesto", "Kirmonshoh", "Behistun", "Naqshi Rustam"], c: 2},
            {q: "Paleos, mezos, neos, eneus ma'nolari?", a: ["qadimgi, o'rta, yangi, mis", "yangi, o'rta, qadimgi, mis", "qadimgi, o'rta, mis, yangi", "qadimgi, o'rta, yangi, mis (lotin)"], c: 0},
            {q: "Yunon tarixchisi Arrian qachon yashagan?", a: ["I asr", "II asr", "III asr", "IV asr"], c: 1},
            {q: "Behistun qoyasi qaysi shoh buyrug'i?", a: ["Doro I", "Doro III", "Kir II", "Kserks"], c: 0},
            {q: "Mezolit nima?", a: ["Yangi tosh", "Mis-tosh", "Qadimgi tosh", "O'rta tosh"], c: 3},
            {q: "Xalqlarning tarixi qaysi tuzumdan boshlangan?", a: ["Feodalizm", "Matriarxat", "Patriarxat", "Ibtidoiy"], c: 3},
            {q: "Tarix asari muallifi?", a: ["Plutarx", "Geradot", "Strabon", "Arrian"], c: 1},
            {q: "Neolit nima?", a: ["Yangi tosh", "Mis-tosh", "Qadimgi tosh", "O'rta tosh"], c: 0},
            {q: "Eng qadimgi yozma manba?", a: ["Xitoy", "Behistun", "Yunon", "Avesto"], c: 1},
            {q: "Eneolit nima?", a: ["Yangi tosh", "Mis-tosh", "Qadimgi tosh", "O'rta tosh"], c: 1},
            {q: "Qazishma ishlarini kim olib boradi?", a: ["Arxeolog", "Etnograf", "Antropolog", "Lingvist"], c: 0},
            {q: "Skeletlarni kim o'rganadi?", a: ["Arxeolog", "Etnograf", "Antropolog", "Lingvist"], c: 2},
            {q: "Moddiy manbalar nima?", a: ["Ma'naviy", "Tarixiy", "Moddiy", "Antropologik"], c: 2},
            {q: "Litos nima?", a: ["Temir", "Mis", "Tosh", "Oltin"], c: 2},
            {q: "Urf-odatlarni kim o'rganadi?", a: ["Arxeolog", "Etnograf", "Antropolog", "Lingvist"], c: 1},
            {q: "Gerodot qachon yashagan?", a: ["Mil.avv II", "Mil.avv IV", "Mil.avv V", "Mil.avv III"], c: 2}
        ];

        let currentQ = 0, score = 0, timeLeft = 15, timer;

        function showTopics() { document.getElementById('main-menu').style.display = 'none'; document.getElementById('topics-menu').style.display = 'block'; }
        function hideTopics() { document.getElementById('main-menu').style.display = 'block'; document.getElementById('topics-menu').style.display = 'none'; }
        
        function confirmAndStart() { if(confirm("Testni boshlaysizmi?")) { document.getElementById('topics-menu').style.display = 'none'; document.getElementById('quiz-container').style.display = 'block'; startQuiz(); } }
        
        function startQuiz() { currentQ = 0; score = 0; showQuestion(); }
        
        function showQuestion() {
            timeLeft = 15;
            document.getElementById('timer').innerText = timeLeft;
            let q = quizData[currentQ];
            document.getElementById('question').innerText = (currentQ+1) + ". " + q.q;
            let ops = document.getElementById('options'); ops.innerHTML = '';
            q.a.forEach((opt, i) => { ops.innerHTML += `<div class="option" onclick="check(${i})">${opt}</div>`; });
            timer = setInterval(() => {
                timeLeft--; document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) { clearInterval(timer); check(-1); }
            }, 1000);
        }

        function check(idx) {
            clearInterval(timer);
            if(idx === quizData[currentQ].c) { alert("✅ To'g'ri!"); score++; }
            else { alert("❌ Xato!"); }
            currentQ++;
            if(currentQ < quizData.length) showQuestion();
            else { alert("Test tugadi! Natija: " + score + "/30"); location.reload(); }
        }
    </script>
</body>
</html>
